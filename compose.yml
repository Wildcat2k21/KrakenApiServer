version: '3.9'

services:
  api-server:
    image: api-server:latest
    ports:
      - "4015:4015"
    restart: always
    volumes:
      - ./logs.txt:/app/logs.txt

  bot-service:
    image: bot-service:latest
    ports:
      - "2909:2909"
    restart: always
    volumes:
      - ./logs.txt:/app/logs.txt